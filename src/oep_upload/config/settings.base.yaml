# Base configuration shared by everyone. Do NOT put machine-specific paths or
# secrets here. Override per environment in settings.dev.yaml / settings.prod.yaml,
# and put your personal paths/target in settings.local.yaml (gitignored).
#
# Precedence (lowest -> highest): base < env-specific < local < env vars / .env

app:
  name: oep-uploader
  timezone: Europe/Berlin
  log_level: INFO

api:
  timeout_s: 30
  # Which OEP instance to talk to: remote (openenergyplatform.org) | local
  target: remote

  remote:
    host: openenergyplatform.org
    api_base_url: https://openenergyplatform.org/api/v0/
    protocol: https

  local:
    host: localhost:8000
    api_base_url: http://localhost:8000/api/v0/
    protocol: http

paths:
  # Folder that holds your datapackage. Relative paths are resolved from the
  # directory you run the tool from (usually the repo root). `~` and $ENV_VARS
  # are expanded. For machine-specific paths use settings.local.yaml so they
  # stay out of version control.
  root: data

  # Optional. Sub-path of `root` that holds the data (defaults to `root`).
  # An absolute value overrides `root`.
  # data_dir: my_dataset

  # Optional. Path to the datapackage.json, relative to `data_dir` (or absolute).
  # datapackage_file: datapackage.json